<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#8B5A2B" />
    <meta name="background-color" content="#FAFAF9" />
    <meta name="description" content="Sistema profissional de recibos para recolha e entrega de tapetes, alfombras e outros artigos." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Recibo Alfombras" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Recibo Alfombras" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon-192x192.png" />
    <link rel="mask-icon" href="./icon.svg" color="#8B5A2B" />
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <title>Recibo Alfombras - Sistema de Recibos Profissional</title>
    
    <style>
      /* Critical CSS for loading state */
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: #FAFAF9;
      }
      #root {
        min-height: 100vh;
      }
      .loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #FAFAF9;
        z-index: 9999;
      }
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #E7E5E4;
        border-top-color: #D97706;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-DG4o8jBB.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DUtEYro4.css">
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="loading-spinner"></div>
        <p style="margin-top: 16px; color: #78716C; font-family: system-ui, sans-serif;">Carregando...</p>
      </div>
    </div>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
